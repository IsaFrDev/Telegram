<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pulse Messenger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Supabase JS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="dark-mode">

  <!-- ════════════════════════════════════════ AUTH SCREEN ════════════════════════════════════════ -->
  <div id="auth-screen" class="screen active">
    <div class="auth-bg">
      <div class="auth-blob b1"></div>
      <div class="auth-blob b2"></div>
    </div>
    <div class="auth-card">
      <div class="logo-wrap" style="margin-bottom: 30px; font-size: 24px; justify-content: center;">
        <div class="logo-icon">P</div> Pulse Messenger
      </div>

      <div id="auth-tabs" class="tab-bar">
        <button id="tab-login" class="tab active">Login</button>
        <button id="tab-signup" class="tab">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div id="form-login" class="form-panel active">
        <div class="field">
          <input type="text" id="login-username" placeholder="Username">
        </div>
        <div class="field">
          <input type="password" id="login-password" placeholder="Password">
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button id="btn-login" class="btn-primary">Log In</button>
      </div>

      <!-- Signup Steps -->
      <div id="form-signup" class="form-panel" style="display:none;">
        <div id="signup-step-1" class="step">
          <div class="field">
            <input type="text" id="signup-username" placeholder="Choose a username">
          </div>
          <div id="signup-error-1" class="form-error hidden"></div>
          <button id="btn-step1" class="btn-primary">Next</button>
        </div>
        <div id="signup-step-2" class="step" style="display:none;">
          <div class="field">
            <input type="text" id="signup-name" placeholder="Full name">
          </div>
          <button id="btn-step2" class="btn-primary">Next</button>
        </div>
        <div id="signup-step-3" class="step" style="display:none;">
          <div class="field">
            <input type="password" id="signup-password" placeholder="Create password">
          </div>
          <div id="signup-error-3" class="form-error hidden"></div>
          <button id="btn-step3" class="btn-primary">Create Account</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════ APP SCREEN ════════════════════════════════════════ -->
  <div id="app-screen" class="screen">

    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo-wrap">
          <div class="logo-icon">P</div> Pulse
        </div>
        <div class="header-actions">
          <button id="btn-theme" class="btn-icon" title="Toggle Theme">
            <svg id="sun-icon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5" />
              <path
                d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
            </svg>
            <svg id="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
            </svg>
          </button>
          <button id="btn-logout" class="btn-icon" title="Logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
            </svg>
          </button>
        </div>
      </div>

      <div class="search-area">
        <div class="search-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8" />
            <path d="M21 21l-4.35-4.35" />
          </svg>
          <input type="text" id="search-input" placeholder="Search people...">
          <button id="search-clear" class="hidden">×</button>
        </div>
      </div>

      <div id="user-list" class="user-list">
        <!-- Users injected here -->
      </div>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div id="chat-area" class="chat-area">
      <!-- Empty State -->
      <div id="empty-state" class="empty-state"
        style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-muted);">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          style="margin-bottom:20px; opacity:0.3;">
          <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 11-7.6-11.2 8.38 8.38 0 013.8.9L21 3z" />
        </svg>
        <h3>Pulse Messenger</h3>
        <p>Select a chat to start messaging.</p>
      </div>

      <!-- Active Chat -->
      <div id="active-chat" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="chat-header">
          <button id="btn-back" class="btn-icon hidden"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5">
              <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg></button>
          <div id="chat-header-avatar" class="avatar"></div>
          <div class="chat-header-info">
            <div id="chat-header-name" class="chat-header-name"></div>
            <div class="chat-header-status">online</div>
          </div>
        </div>

        <div id="messages-area" class="messages-area">
          <!-- Messages injected here -->
        </div>

        <div class="chat-input-area">
          <button id="btn-attach" class="btn-icon" title="Attach file">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path
                d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" />
            </svg>
          </button>

          <button id="btn-camera" class="btn-icon" title="Take a photo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
            </svg>
          </button>

          <input type="file" id="media-picker" class="hidden" accept="image/*,video/*">

          <input type="text" id="msg-input" placeholder="Type a message...">

          <div id="recording-overlay" class="hidden">
            <div class="recording-dot"></div>
            <span id="recording-time">0:00</span>
            <div id="recording-cancel">Slide to cancel ←</div>
          </div>

          <button id="btn-record" class="btn-icon" title="Tap to switch, Hold to record">
            <svg id="mic-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" />
              <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8" />
            </svg>
            <svg id="camera-icon" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
            </svg>
            <div id="circular-preview" class="hidden"></div>
          </button>

          <button id="btn-send" class="btn-send hidden">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              transform="rotate(-45) translate(2,0)">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- Custom Context Menu -->
  <div id="context-menu" class="context-menu hidden">
    <button id="btn-delete-msg" class="menu-item delete">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6" />
      </svg>
      Delete Message
    </button>
  </div>

  <!-- Camera Capture Overlay -->
  <div id="capture-overlay" class="hidden">
    <div class="capture-card">
      <video id="capture-video" autoplay playsinline></video>
      <div class="capture-actions">
        <button id="btn-snap" class="btn-primary">Snap Photo</button>
        <button id="btn-close-capture" class="btn-icon">×</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
